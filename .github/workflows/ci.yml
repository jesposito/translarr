name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ffmpeg + mkvtoolnix
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mkvtoolnix
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check server tests
      - name: Test
        run: pytest -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t translarr:ci .
